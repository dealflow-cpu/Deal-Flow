services:
  - type: web
    name: dealflow
    runtime: python
    buildCommand: pip install -r requirements.txt && mkdir -p public && cp index.html public/index.html
    startCommand: gunicorn server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: cron
    name: dealflow-scraper
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scraper.py
    schedule: "0 */4 * * *"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
