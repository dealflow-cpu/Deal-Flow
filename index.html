// ─── Data Layer ───
// In production: fetch("listings.json") or fetch("https://your-api.com/listings")
// For demo/development: falls back to empty state with instructions

async function loadListings(){
  // Try loading real scraped data from multiple locations
  const sources=[
    "/listings.json",           // Same server (Render deployment)
    "./listings.json",          // Local file (development)
    window.location.origin+"/listings.json", // Absolute URL
  ];
  for(const url of sources){
    try{
      const r=await fetch(url);
      if(r.ok){
        const data=await r.json();
        if(data.listings&&data.listings.length>0){
          return data.listings.map((l,i)=>({
            id:l.id||`DF-${i+1}`,
            title:l.title||"Untitled Listing",
            description:l.description||l.raw_text||"",
            source:l.source||"Unknown",
            sourceUrl:l.source_url||"",
            askingPrice:l.asking_price||0,
            cashFlow:l.cash_flow||0,
            grossRevenue:l.gross_revenue||0,
            sde:l.sde||0,
            ebitda:l.ebitda||0,
            ffe:l.ffe||0,
            inventory:l.inventory||0,
            rent:l.rent||0,
            employees:l.employees||0,
            yearEst:l.year_established||0,
            city:l.city||"",
            state:l.state||"MT",
            industry:l.detected_industry||"",
            sba:!!l.sba_prequalified,
            absentee:!!l.absentee,
            realEstate:!!l.real_estate_included,
            homeBased:!!l.home_based,
            recurring:!!l.recurring_revenue,
            scrapedAt:l.scraped_at||"",
          }));
        }
      }
    }catch(e){/* try next source */}
  }
  return null; // No data found
}

function App(){
  const[listings,setListings]=useState(null); // null=loading, []=empty, [...]= data
